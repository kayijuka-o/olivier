<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Face Tracking</title>

<style>
body {
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

/* container with perspective */
.container {
    perspective: 1000px;
}

/* hologram box */
.holo-box {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    transform-style: preserve-3d;
    transition: transform 0.1s;
}

/* image */
.holo-img {
    width: 100%;
    border-radius: 50%;
    filter: brightness(1.2) contrast(1.3);
}

/* glow */
.holo-box::before {
    content: "";
    position: absolute;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f5ff55, transparent 70%);
    top: -10px;
    left: -10px;
    z-index: -1;
    animation: pulse 3s infinite;
}

/* scan lines */
.holo-box::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,255,0.08) 0px,
        rgba(0,255,255,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    border-radius: 50%;
    pointer-events: none;
}

/* animation */
@keyframes pulse {
    0% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0.5; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <div class="holo-box" id="card">
        <img src="1.jpg" class="holo-img">
    </div>
</div>

<script>
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.clientX) / 25;
    let y = (window.innerHeight / 2 - e.clientY) / 25;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* reset on leave */
document.addEventListener("mouseleave", () => {
    card.style.transform = "rotateY(0deg) rotateX(0deg)";
});
</script>

</body>
</html>
