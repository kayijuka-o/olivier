<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Gallery</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #020617, #0f172a);
    color: white;
}

/* HEADER */
header {
    background: rgba(2,6,23,0.8);
    backdrop-filter: blur(12px);
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
}

nav a {
    color: #38bdf8;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* SLIDER */
.slider {
    position: relative;
    width: 90%;
    height: 60vh;
    margin: 30px auto;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transform: scale(1.1);
    transition: opacity 1s ease, transform 1s ease;
}

.slide.active {
    opacity: 1;
    transform: scale(1);
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */
.controls {
    position: absolute;
    width: 100%;
    top: 50%;
    display: flex;
    justify-content: space-between;
    transform: translateY(-50%);
}

.controls span {
    cursor: pointer;
    font-size: 30px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    transition: 0.3s;
}

.controls span:hover {
    background: #38bdf8;
}

/* GALLERY GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 30px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
    filter: brightness(0.8);
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <h1>My Gallery</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- SLIDESHOW -->
<div class="slider" id="slider">

    <div class="slide active"><img src="1.jpg"></div>
    <div class="slide"><img src="2.jpg"></div>
    <div class="slide"><img src="3.jpg"></div>
    <div class="slide"><img src="4.jpg"></div>

    <div class="controls">
        <span onclick="prevSlide()">❮</span>
        <span onclick="nextSlide()">❯</span>
    </div>

</div>

<!-- GRID -->
<div class="gallery">
    <img src="1.jpg" onclick="goToSlide(0)">
    <img src="2.jpg" onclick="goToSlide(1)">
    <img src="3.jpg" onclick="goToSlide(2)">
    <img src="4.jpg" onclick="goToSlide(3)">
</div>

<footer>
    <p>© 2026 Olivier KAYIJUKA</p>
</footer>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;
let interval;

/* SHOW SLIDE */
function showSlide(i) {
    slides.forEach((slide) => slide.classList.remove("active"));
    slides[i].classList.add("active");
}

/* NEXT */
function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

/* PREVIOUS */
function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

/* CLICK FROM GRID */
function goToSlide(i) {
    index = i;
    showSlide(index);
}

/* AUTO PLAY */
function startAuto() {
    interval = setInterval(nextSlide, 4000);
}

/* PAUSE ON HOVER */
function stopAuto() {
    clearInterval(interval);
}

document.getElementById("slider").addEventListener("mouseover", stopAuto);
document.getElementById("slider").addEventListener("mouseout", startAuto);

/* INIT */
startAuto();
</script>

</body>
</html>
